<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LifeDecode World</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(1200px 700px at 16% 10%, rgba(122,92,255,.20), transparent 60%),
        radial-gradient(920px 640px at 84% 16%, rgba(56,215,255,.12), transparent 56%),
        linear-gradient(180deg, #05060d 0%, #090d1d 46%, #060711 100%);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #world-page {
      position: relative;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-shell {
      position: relative;
      width: min(1400px, 100vw);
      height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: transparent;
    }

    #game-root {
      width: min(1400px, 100vw);
      aspect-ratio: 960 / 640;
      max-height: 100svh;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      margin: 0 auto;
    }

    #rotate-overlay {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 9999;
      background:
        radial-gradient(1200px 700px at 16% 10%, rgba(122,92,255,.20), transparent 60%),
        radial-gradient(920px 640px at 84% 16%, rgba(56,215,255,.12), transparent 56%),
        linear-gradient(180deg, #05060d 0%, #090d1d 46%, #060711 100%);
      color: white;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    #rotate-overlay .box {
      max-width: 320px;
      padding: 22px 18px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,12,24,.78);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
    }

    @media (max-width: 767px) and (orientation: portrait) {
      #game-shell { display: none; }
      #rotate-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <div id="world-page">
    <div id="game-shell">
      <div id="game-root"></div>
    </div>

    <div id="rotate-overlay">
      <div class="box">
        <h2>Rotate your phone</h2>
        <p>Turn your device sideways for best experience.</p>
      </div>
    </div>
  </div>

  <script src="main.js?v=2"></script>
</body>
</html>
