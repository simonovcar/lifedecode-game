<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeDecode World</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0b0b0f;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    #game-shell {
      position: relative;
      width: min(960px, 100vw);
      aspect-ratio: 960 / 640;
      margin: 20px auto;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      background: #000;
    }

    #game-root {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto !important;
    }

    @media (max-width: 767px) {
      body {
        display: block;
      }

      #game-shell {
        width: 100vw;
        margin: 0 auto;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <div id="game-root"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
